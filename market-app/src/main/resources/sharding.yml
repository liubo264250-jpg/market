databaseName: market_db
mode:
  type: Standalone
  repository:
    type: JDBC
dataSources:
  market:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:13306/market
    username: root
    password: 123456
  # 分片库1
  market_01:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:13306/market_01
    username: root
    password: 123456
  # 分片库2
  market_02:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:13306/market_02
    username: root
    password: 123456
rules:
  # ========== 单表规则：market 库中不分片的表 ==========
  - !SINGLE
    tables:
      - market.*
    defaultDataSource: market  # 新建单表时默认落到 market 库

  # ========== 分片规则：market_01、market_02 ==========
  - !SHARDING
    tables:
      # raffle_activity_order 分库分表
      raffle_activity_order:
        actualDataNodes: market_0$->{1..2}.raffle_activity_order_00$->{0..3}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: table-inline
      # raffle_activity_account 只分库不分表
      raffle_activity_account:
        actualDataNodes: market_0$->{1..2}.raffle_activity_account
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
      # raffle_activity_account_day 只分库不分表
      raffle_activity_account_day:
        actualDataNodes: market_0$->{1..2}.raffle_activity_account_day
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
      # raffle_activity_account_month 只分库不分表
      raffle_activity_account_month:
        actualDataNodes: market_0$->{1..2}.raffle_activity_account_month
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
      # task 只分库不分表
      task:
        actualDataNodes: market_0$->{1..2}.task
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
      # user_award_record 分库分表
      user_award_record:
        actualDataNodes: market_0$->{1..2}.user_award_record_00$->{0..3}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: table-inline
      # user_raffle_order 分库分表
      user_raffle_order:
        actualDataNodes: market_0$->{1..2}.user_raffle_order_00$->{0..3}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: table-inline
      # user_behavior_rebate_order 分库分表
      user_behavior_rebate_order:
        actualDataNodes: market_0$->{1..2}.user_behavior_rebate_order_00$->{0..3}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db-inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: table-inline

    shardingAlgorithms:
      db-inline:
        type: CLASS_BASED
        props:
          pad-width: 2
          start-index: 1
          strategy: standard
          algorithmClassName: com.liubo.sharding.algorithms.StringHashShardingAlgorithm
      table-inline:
        type: CLASS_BASED
        props:
          pad-width: 3
          start-index: 0
          strategy: standard
          algorithmClassName: com.liubo.sharding.algorithms.StringHashShardingAlgorithm
props:
  sql-show: true
